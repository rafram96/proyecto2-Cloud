org: nicolasllerenas
service: productos-ingesta

provider:
  name: aws
  runtime: python3.11  
  stage: ${opt:stage, 'dev'}
  region: us-east-1
  environment:
    ELASTICSEARCH_ENDPOINT: !ImportValue api-productos-${self:provider.stage}-ElasticsearchEndpoint
    AWS_REGION: us-east-1
  iam:  # Corregido de 'lam' a 'iam'
    role: arn:aws:iam::790361999801:role/LabRole

functions:
  actualizarProductos:
    handler: lambda_function.lambda_handler
    timeout: 60
    memorySize: 1024
    events:
      - stream:
          type: dynamodb
          arn: !ImportValue api-productos-${self:provider.stage}-ProductosTableStreamArn
          batchSize: 100
          startingPosition: LATEST
          maximumBatchingWindowInSeconds: 10

plugins:
  - serverless-python-requirements

custom:
  pythonRequirements:
    dockerizePip: true
    useStaticCache: false
    slim: false
    noDeploy: 
      - boto3
      - botocore